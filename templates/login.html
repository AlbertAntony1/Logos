<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login-page-stylesheet.css') }}">
</head>
<body>
    <nav style="background-color: var(--secondary-color);">
        <div  onclick="location.href='/'">
            <img src="{{ url_for('static', filename='Resources/Images/Logos/Logo.png')}}" alt="Logo">
            <h3 class="logo-text">Logos</h3>
        </div>
        <div class="menu">
            <a href="/home">Home</a>
            <a href="/chat">Chat</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
            <a href="/profile">Profile</a>
        </div>
    </nav> 
        
    <main>
        <section class="LoginOptions">
            <h1 class="headline">Login Now!</h1>
            <form><label for="">Email: </label>
            <input type="email" name="" id="EmailInput">
            <br>
        </form>
            <button id="OTPSendBtn" style="width: 100%;">Send OTP</button>
            



            <p>or</p>
            <button id="GoogleLoginBtn"><svg class="svg" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 18 18"><path fill="#4285f4" fill-opacity="1" fill-rule="evenodd" stroke="none" d="M17.64 9.2q-.002-.956-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"></path><path fill="#34a853" fill-opacity="1" fill-rule="evenodd" stroke="none" d="M9.003 18c2.43 0 4.467-.806 5.956-2.18l-2.909-2.26c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.96v2.332C2.44 15.983 5.485 18 9.003 18"></path><path fill="#fbbc05" fill-opacity="1" fill-rule="evenodd" stroke="none" d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042z"></path><path fill="#ea4335" fill-opacity="1" fill-rule="evenodd" stroke="none" d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.428 0 9.002 0 5.485 0 2.44 2.017.96 4.958L3.967 7.29c.708-2.127 2.692-3.71 5.036-3.71"></path></svg> Login with Google</button>
        </section>
        
        <section class="OTPVerification" style="display: none;">
            <h1 class="headline">Login Now!</h1>
            <form>
            <label for="">Name: </label>
            <input type="text" name="" id="NameInput">
            <br>
            <label for="">OTP: </label>
            <input type="number" name="" id="OTPInput">
            <br>
            </form>
            <button id="OTPLoginBtn" style="width: 100%;">Login</button>
        </section>
    </main>


    <script src="{{url_for('static', filename='js/script-login.js')}}"></script>
</body>
</html>
