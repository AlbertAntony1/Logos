<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login-page-stylesheet.css') }}">
</head>
<body>
    <nav style="background-color: var(--secondary-color);">
        <div  onclick="location.href='/'">
            <img src="{{ url_for('static', filename='Resources/Images/Logos/Logo.png')}}" alt="Logo">
            <h3 class="logo-text">Logos</h3>
        </div>
        <div class="menu">
            <a href="/home">Home</a>
            <a href="/chat">Chat</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
            <a href="/profile">Profile</a>
        </div>
    </nav> 
        
    <main>
        <section style="gap: 10px;">
            <h1 class="headline">Your Profile</h1>
            <div>
            <img class="userProfilePicture" src="{{picture}}" alt="">
            <input style="display: none;" type="file" accept="image/*">
            <form>
                <label for="">Name:</label>
                <input class="userName" value="{{username}}"> </input>
                <br>
                <label for="">User ID:</label>
                <input class="userId" value="{{userId}}"> </input>
            </form>
            </div>
            <button onclick="location.href= '/logout'">Logout</button>
        </section>
    </main>

    <script src="{{url_for('static', filename='js/script-profile.js')}}"></script>
</body>
</html>
